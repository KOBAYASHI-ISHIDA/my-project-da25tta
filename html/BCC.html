<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Bảng cửu chương</title>
    </head>
	<body>
			<form id="BCC">
                <label>Nhập vào 1 bảng cửu chương</label>
                <input type="number" id="txtSo" name="txtSo" value="2">
                <input type="button" onclick="BCC(document.getElementById(`txtSo`).value)" value="Bảng cửu chương">
            </form>
            <br>
            <div id="result">
                
            </div>
            <script>
                function BCC(n)
                    {                     
                        let result="";
                        for(let i=1;i<=10;i++)
                        result += `${n} * ${i} = ${n * i}<br>`;
                        document.getElementById("result").innerHTML = result;
                    } 
            </script>
	</body>
