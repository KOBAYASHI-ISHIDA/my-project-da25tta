<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Hóa đơn bán hàng</title>
         <link rel="stylesheet" href="../css/hoadon.css">
    </head>
	<body>
        <p>HÓA ĐƠN BÁN HÀNG</p>
        <div class="container">
			<table border="1px solid black">
                <tr>
                    <th>STT</th>
                    <th>Tên hàng</th>
                    <th>Số lượng</th>
                    <th>Đơn giá</th>
                    <th>Đơn vị tính</th>
                    <th>Thành tiền</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>A</td>
                    <td class="sl">2</td>
                    <td class="dg">50</td>
                    <td>Thùng</td>
                    <td class="tt">?</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>B</td>
                    <td class="sl">5</td>
                    <td class="dg">70</td>
                    <td>Cái</td>
                    <td class="tt">?</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>C</td>
                    <td class="sl">7</td>
                    <td class="dg">100</td>
                    <td>Thùng</td>
                    <td class="tt">?</td>
                </tr>
                <tr>
                    <td colspan="4">Tổng thanh toán</td>
                    <td colspan="2" id="ttt">?</td>
                </tr>
            </table>
        </div>
        <script>
            const sl = document.getElementsByClassName("sl");
            const tt = document.getElementsByClassName("tt");
            const dg = document.getElementsByClassName("dg");
            
            let tongthanhtoan=0;

            for(i=0 ; i<sl.length ; i++){
                (tt[i]).innerHTML = Number(sl[i].innerHTML)*Number(dg[i].innerHTML);

                tongthanhtoan=Number(tongthanhtoan)+Number(tt[i].innerHTML);
            }

            document.getElementById("ttt").innerHTML = Number(tongthanhtoan);

        </script>
	</body>
