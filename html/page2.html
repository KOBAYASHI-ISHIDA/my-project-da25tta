<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Đăng nhập</title>
        <link rel="stylesheet" href="../css/style2.css">
    </head>
	<body>
			<div class="container">
				<form class="frmlogin">
					<h2 class="tieude">Form Login</h2>

							<input type="text" id="Usernametxt" placeholder="Nhập Tên Người Dùng">
						</div>
						<div class="password">
							<label id="Password" for="Passwordtxt" class="label">Password</label>
							<input type="password" id="Passwordtxt" placeholder="Nhập mật khẩu">
						</div>
						<div class="signup">
							<p>Chưa có tài khoản? </p>
							<a href="../html/dangki.html" target="blank">Đăng kí</a>
						</div>
						<div class="boxbutton">
							<input type="submit" value="Login" id="Login" class="button">
							<input type="reset" value="Reset" id="Reset" class="button" >
						</div>
				</form>
			</div>
	</body>
