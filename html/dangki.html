<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Đăng kí</title>
        <link rel="stylesheet" href="../css/style3.css">
    </head>
	<body>
			<div class="container">
				<form class="frmlogin">
					<h2 class="tieude">Form Sign Up</h2>
						<div class="username">
							<label id="Username" for="Usernametxt" class="label">Tạo Username</label>
							<input type="text" id="Usernametxt" placeholder="Nhập Tên Người Dùng">
						</div>
						<div class="password">
							<label id="Password" for="Passwordtxt" class="label">Tạo Mật Khẩu</label>
							<input type="password" id="Passwordtxt" placeholder="Nhập mật khẩu">
						</div>
						<div class="date">
							<label id="date" for="Datetxt" class="label">Nhập ngày sinh nhật</label>
							<input type="date" id="Datetxt">
						</div>
						<div class="email">
							<label id="email" for="Emailtxt" class="label">Nhập Email</label>
							<input type="email" id="Emailtxt" placeholder="example@gmail.com">
						</div>
						<div class="signup">
							<p>Đã có tài khoản?</p>
							<a href="../html/page2.html" target="blank">Đăng Nhập Tại Đây</a>
						</div>
						<div class="boxbutton">
							<input type="submit" value="Sign Up" id="Login" class="button">
							<input type="reset" value="Reset" id="Reset" class="button" >
						</div>
				</form>
			</div>
	</body>
